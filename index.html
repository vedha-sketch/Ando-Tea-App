<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ando Dynamic Scape - Nihonga Light Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #E4E1D8; font-family: 'DM Serif Display', serif; }
    .font-sans { font-family: 'DM Sans', sans-serif !important; }
    
    .paper-texture {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.6;
      pointer-events: none;
      z-index: 60;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.03' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' fill='%23ffffff'/%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4' style='mix-blend-mode: multiply;'/%3E%3C/svg%3E");
    }

    .mist-layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(238,236,228,0.95) 0%, rgba(238,236,228,0.4) 30%, transparent 100%);
      pointer-events: none;
      z-index: 5;
    }
    
    .watercolor-edge {
      filter: url(#watercolor-bleed);
    }
    @keyframes bambooSway0 {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(3deg); }
    }
    @keyframes bambooSway1 {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(4deg); }
    }
    @keyframes bambooSway2 {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(5deg); }
    }
    @keyframes bellSwing {
      0%, 100% { transform-origin: top center; transform: rotate(0deg); }
      10% { transform: rotate(12deg); }
      20% { transform: rotate(-10deg); }
      30% { transform: rotate(8deg); }
      40% { transform: rotate(-6deg); }
      50% { transform: rotate(4deg); }
      60% { transform: rotate(-3deg); }
      70% { transform: rotate(2deg); }
      80% { transform: rotate(-1deg); }
      90% { transform: rotate(0.5deg); }
    }
    @keyframes sakuraFall {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.8; }
      25% { transform: translateY(25vh) translateX(20px) rotate(90deg); opacity: 0.7; }
      50% { transform: translateY(50vh) translateX(-15px) rotate(180deg); opacity: 0.5; }
      75% { transform: translateY(75vh) translateX(25px) rotate(270deg); opacity: 0.3; }
      100% { transform: translateY(105vh) translateX(-10px) rotate(360deg); opacity: 0; }
    }
    @keyframes snowfall {
      0% { transform: translateY(0) translateX(0); opacity: 0.7; }
      25% { transform: translateY(25vh) translateX(10px); }
      50% { transform: translateY(50vh) translateX(-5px); opacity: 0.5; }
      75% { transform: translateY(75vh) translateX(8px); }
      100% { transform: translateY(100vh) translateX(-3px); opacity: 0; }
    }
    @keyframes chimeSwing {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(8deg); }
      75% { transform: rotate(-8deg); }
    }
    @keyframes pineLeafFall {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0.8; }
      25% { transform: translate(8px, 25vh) rotate(90deg); opacity: 0.7; }
      50% { transform: translate(-5px, 50vh) rotate(180deg); opacity: 0.5; }
      75% { transform: translate(10px, 75vh) rotate(270deg); opacity: 0.3; }
      100% { transform: translate(3px, 100vh) rotate(360deg); opacity: 0; }
    }
    @keyframes treeShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(6px); }
      30% { transform: translateX(-5px); }
      45% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      75% { transform: translateX(1px); }
    }
    @keyframes mountainScroll1 { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes mountainScroll2 { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes mountainScroll3 { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    let audioCtx = null;
    const PENTATONIC = [277.18, 329.63, 369.99, 415.30, 493.88, 554.37, 659.25];
    
    window.playSuikinkutsu = function() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)] * 2, audioCtx.currentTime);
      
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800;
      filter.Q.value = 15;
      
      osc.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 1.5);
    };

    window.playBellRing = function() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const t = audioCtx.currentTime;
      // Two metallic bell tones for suzu sound
      [880, 1318.5].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.98, t + 1.5);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(i === 0 ? 0.15 : 0.08, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t + i * 0.05);
        osc.stop(t + 2.0);
      });
      // Add shimmer harmonics
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(2637, t);
      gain2.gain.setValueAtTime(0, t);
      gain2.gain.linearRampToValueAtTime(0.03, t + 0.01);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(t);
      osc2.stop(t + 1.0);
    };

    window.playBark = function() {
      const audio = new Audio('./DogBark.wav');
      audio.volume = 0.6;
      audio.play();
    };

    window.playTreeRustle = function() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const bufferSize = audioCtx.sampleRate * 0.6;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const bandpass = audioCtx.createBiquadFilter();
      bandpass.type = 'bandpass';
      bandpass.frequency.value = 2500;
      bandpass.Q.value = 0.5;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

      noise.connect(bandpass);
      bandpass.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start();
    };
  </script>

  <svg style="width: 0; height: 0; position: absolute;">
    <filter id="watercolor-bleed" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feGaussianBlur in="displaced" stdDeviation="0.6" />
    </filter>
  </svg>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { flushSync } from 'https://esm.sh/react-dom@18';
    import { motion, AnimatePresence, useAnimationFrame, useMotionValue } from 'https://esm.sh/framer-motion@11?deps=react@18';

    const BIOMES = ['shrine', 'bamboo', 'zen', 'sakura', 'snow'];
    const rnd = (min, max) => Math.random() * (max - min) + min;

    const CHUNK_WIDTH = 2600;

    const GroundPlane = () => (
      <div className="absolute bottom-[-5px] w-full h-[20vh] z-[1]" />
    );

    const WoodBoardwalk = () => (
      <>
        <div className="absolute bottom-[-3vh] w-full h-[20vh] z-[5] pointer-events-none drop-shadow-2xl">
          <svg viewBox="0 0 2600 100" preserveAspectRatio="none" className="w-full h-full">
             {/* Soft shadow below boardwalk */}
             <rect x="0" y="28" width="2600" height="4" fill="black" opacity="0.15" rx="2" />
             {/* Main boardwalk body - warm flat wood tone */}
             <rect x="0" y="0" width="2600" height="28" fill="#8B7355" />
             {/* Subtle top highlight */}
             <rect x="0" y="0" width="2600" height="3" fill="#A08B6E" opacity="0.6" />
             {/* Soft plank divisions - very subtle */}
             {Array.from({ length: 40 }).map((_, i) => (
               <line key={i} x1={i * 65 + 32} y1="0" x2={i * 65 + 32} y2="28" stroke="#6E5D45" strokeWidth="0.8" opacity="0.3" />
             ))}
             {/* Bottom edge - darker tone */}
             <rect x="0" y="22" width="2600" height="6" fill="#6E5D45" opacity="0.4" />
          </svg>
        </div>
      </>
    );

    const TallGrass = () => (
      <div className="absolute bottom-[14vh] w-full h-[15vh] z-[4] pointer-events-none">
        <svg viewBox="0 0 2600 200" preserveAspectRatio="none" className="w-full h-full">
          <style>{`
            @keyframes grassSway {
              0%, 100% { transform: rotate(0deg); }
              25% { transform: rotate(2deg); }
              75% { transform: rotate(-2deg); }
            }
          `}</style>
          {/* Grass tufts */}
          {Array.from({ length: 100 }).map((_, i) => {
            const x = i * 18 + rnd(-10, 10);
            const h = rnd(40, 90);
            const lean = rnd(-8, 8);
            const green = ['#5A7247', '#4A6038', '#6B8A54', '#3D5230', '#7A9B64'][i % 5];
            const delay = rnd(0, 3).toFixed(2);
            const dur = rnd(2.5, 4.5).toFixed(2);
            return (
              <path
                key={i}
                d={`M${x},200 L${x + lean * 0.3},${200 - h} L${x + lean * 0.3 + 8},${200 - h} L${x + 10},200 Z`}
                fill={green}
                opacity={rnd(0.5, 0.8).toFixed(2)}
                style={{ transformOrigin: `${x + 5}px 200px`, animation: `grassSway ${dur}s ease-in-out ${delay}s infinite` }}
              />
            );
          })}
        </svg>
      </div>
    );

    const StoneBase = () => (
      <div className="absolute bottom-[-3vh] w-full h-[20vh] z-[4] pointer-events-none drop-shadow-2xl">
        <svg viewBox="0 0 2600 100" preserveAspectRatio="none" className="w-full h-full">
           <rect width="2600" height="100" fill="#4B4B4B" />
           {/* Stone outlines/cracks - perspective lines converging to center top */}
           {Array.from({ length: 100 }).map((_, i) => {
             const topX = 1300 + (i - 50) * 12;
             const bottomX = 1300 + (i - 50) * 30;
             return (
               <path
                 key={i}
                 d={`M${topX},0 L${bottomX},100`}
                 stroke="#1A1A1A"
                 strokeWidth="0.3"
                 fill="none"
                 opacity="0.08"
               />
             );
           })}
        </svg>
      </div>
    );

    const Bear = ({ left }) => {
      const [forward, setForward] = useState(false);
      const handleTap = (e) => {
        e.stopPropagation();
        window.playSuikinkutsu();
        setForward(prev => !prev);
      };
      return (
        <div
          className="absolute z-[3] origin-bottom pointer-events-none"
          style={{ bottom: '14vh', left: `${left}%`, width: '140vw', height: '140vw' }}
        >
          <img
            src={forward ? './BearForward.png' : './BearRight.png'}
            className="w-full h-full object-contain"
            draggable="false"
          />
          <div onClick={handleTap} className="absolute cursor-pointer" style={{ pointerEvents: 'auto', left: '20%', top: '15%', width: '60%', height: '75%' }} />
        </div>
      );
    };

    const Deer = ({ left }) => {
      const [isBowing, setIsBowing] = useState(false);

      const handleTap = (e) => {
        e.stopPropagation();
        window.playSuikinkutsu();
        setIsBowing(prev => !prev);
      };

      return (
        <div
          className="absolute z-[3] origin-bottom pointer-events-none"
          style={{ bottom: '1vh', left: `${left}%`, width: '106vw', height: '106vw' }}
        >
          <img
            src={isBowing ? './deer_new_1.png' : './deer_new_2.png'}
            className="w-full h-full object-contain"
            draggable="false"
          />
          <div onClick={handleTap} className="absolute cursor-pointer" style={{ pointerEvents: 'auto', left: '20%', top: '15%', width: '60%', height: '75%' }} />
        </div>
      );
    };

    const Tanuki = ({ left }) => {
      const [isBending, setIsBending] = useState(false);
      const handleTap = (e) => {
        e.stopPropagation();
        window.playSuikinkutsu();
        setIsBending(prev => !prev);
      };
      return (
        <div
          className="absolute z-[3] origin-bottom"
          style={{ bottom: '13vh', left: `${left}%`, width: '70vw' }}
        >
          {/* Tanuki on top of rock */}
          <div
            onClick={handleTap}
            className="relative cursor-pointer"
            style={{ width: '60vw', height: '60vw', margin: '0 auto', marginBottom: '1vh', position: 'relative', zIndex: 1 }}
          >
            <img
              src={isBending ? './TanukiBend.png' : './TanukiStand.png'}
              className="w-full h-full object-contain pointer-events-none"
              draggable="false"
            />
          </div>
          {/* Shadow between tanuki and rock */}
          <svg viewBox="0 0 100 10" className="pointer-events-none" style={{ width: '50%', margin: '-2.5vh auto 0', position: 'relative', zIndex: 1 }}>
            <ellipse cx="50" cy="5" rx="40" ry="4" fill="black" opacity="0.12" />
          </svg>
          {/* Rock underneath - trapezoidal */}
          <svg viewBox="0 0 140 60" className="w-full" style={{ marginTop: '-4vh', position: 'relative', zIndex: 0 }}>
            {/* Main rock body - trapezoid with flat top */}
            <path d="M30,8 L110,8 L130,55 Q70,62 10,55 Z" fill="#6E685E" />
            {/* Lighter face */}
            <path d="M35,10 L105,10 L120,50 Q70,56 18,50 Z" fill="#7A7368" />
            {/* Highlight on top surface */}
            <path d="M38,10 L100,10 L95,18 L42,18 Z" fill="#8A8578" opacity="0.5" />
            {/* Subtle edge shadow */}
            <path d="M10,55 Q70,62 130,55 Q70,58 10,55" fill="#5C5650" opacity="0.3" />
          </svg>
        </div>
      );
    };

    const DOG_WALK_FRAMES = ['./DogWalk1.png', './DogWalk2.png', './DogWalk4.png'];
    const DOG_STANDING = './DogStanding.png';
    const panPausedRef = { current: false };

    const ShibaDog = React.memo(() => {
      const frameRef = useRef(0);
      const imgRef = useRef(null);
      const shadowRef = useRef(null);
      const walkingRef = useRef(true);
      const rafRef = useRef(null);
      const lastFrameTime = useRef(0);

      useEffect(() => {
        let cancelled = false;
        const loop = (time) => {
          if (cancelled) return;
          if (walkingRef.current && time - lastFrameTime.current > 140) {
            lastFrameTime.current = time;
            frameRef.current = (frameRef.current + 1) % DOG_WALK_FRAMES.length;
            if (imgRef.current) imgRef.current.src = DOG_WALK_FRAMES[frameRef.current];
          }
          rafRef.current = requestAnimationFrame(loop);
        };
        rafRef.current = requestAnimationFrame(loop);
        return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
      }, []);

      const handleClick = (e) => {
        e.stopPropagation();
        if (!walkingRef.current) return;
        walkingRef.current = false;
        window.playSuikinkutsu();
        if (imgRef.current) imgRef.current.src = DOG_STANDING;
        if (shadowRef.current) shadowRef.current.setAttribute('rx', '44');
        panPausedRef.current = true;
        setTimeout(() => {
          panPausedRef.current = false;
          walkingRef.current = true;
          if (shadowRef.current) shadowRef.current.setAttribute('rx', '50');
          frameRef.current = 0;
          lastFrameTime.current = 0;
        }, 2000);
      };

      return (
        <div
          onClick={handleClick}
          className="absolute z-[45] origin-bottom drop-shadow-2xl cursor-pointer"
          style={{ left: '50%', transform: 'translateX(-50%)', width: '53vw', height: '36vw', bottom: '-4vh' }}
        >
          <img
            ref={imgRef}
            src={DOG_WALK_FRAMES[0]}
            className="object-contain pointer-events-none"
            style={{ position: 'relative', top: '-17vw', width: '53vw', height: '53vw' }}
            draggable="false"
          />
          <svg viewBox="0 0 100 20" className="absolute bottom-[28%] left-[5%] w-[90%] h-[10%] -z-10 pointer-events-none">
            <ellipse ref={shadowRef} cx="50" cy="10" rx="50" ry="7" fill="black" opacity="0.18" />
          </svg>
        </div>
      );
    });

    const ToriiGate = ({ left }) => {
      const [isOn, setIsOn] = useState(false);

      return (
        <div
          className="absolute bottom-[12vh] z-[3] origin-bottom transition-all drop-shadow-2xl pointer-events-none"
          style={{ left: `${left}%`, width: '140vw', height: '140vw' }}
        >
          <img
            src={isOn ? './TorriGateON.png' : './TorriGate.png'}
            className="w-full h-full object-contain"
            draggable="false"
          />
          {/* Clickable area - gate center */}
          <div onClick={(e) => { e.stopPropagation(); window.playSuikinkutsu(); setIsOn(prev => !prev); }}
            className="absolute cursor-pointer" style={{ pointerEvents: 'auto', left: '25%', top: '10%', width: '50%', height: '80%' }} />
          {isOn && (
            <>
              <div className="absolute pointer-events-none rounded-full" style={{ left: '28%', top: '58%', width: '20%', height: '14%', background: 'radial-gradient(circle, rgba(255,220,120,0.4) 0%, rgba(255,190,80,0.2) 30%, transparent 70%)', filter: 'blur(8px)' }} />
              <div className="absolute pointer-events-none rounded-full" style={{ left: '52%', top: '58%', width: '20%', height: '14%', background: 'radial-gradient(circle, rgba(255,220,120,0.4) 0%, rgba(255,190,80,0.2) 30%, transparent 70%)', filter: 'blur(8px)' }} />
            </>
          )}
        </div>
      );
    };

    const Pagoda = ({ left }) => {
      const [glowing, setGlowing] = useState(false);
      const handleTap = (e) => {
        e.stopPropagation();
        window.playSuikinkutsu();
        setGlowing(prev => !prev);
      };
      return (
        <div
          className="absolute bottom-[14vh] z-[2] origin-bottom drop-shadow-2xl pointer-events-none"
          style={{ left: `${left}%`, width: '217vw', height: '242vw' }}
        >
          <img
            src="./Shrine.png"
            className="w-full h-full object-contain"
            draggable="false"
          />
          {/* Clickable area */}
          <div onClick={handleTap} className="absolute cursor-pointer" style={{ pointerEvents: 'auto', left: '25%', top: '20%', width: '50%', height: '70%' }} />
          {/* Warm offering glow */}
          {glowing && (
            <>
              <div className="absolute pointer-events-none" style={{
                left: '3%', top: '75%', width: '50%', height: '25%',
                borderRadius: '50%',
                background: 'radial-gradient(circle, rgba(255,190,80,0.7) 0%, rgba(255,170,60,0.4) 40%, transparent 70%)',
                filter: 'blur(10px)',
              }} />
              <div className="absolute pointer-events-none" style={{
                left: '-12%', top: '60%', width: '80%', height: '45%',
                borderRadius: '50%',
                background: 'radial-gradient(circle, rgba(255,200,100,0.35) 0%, rgba(255,180,80,0.15) 40%, transparent 70%)',
                filter: 'blur(25px)',
              }} />
            </>
          )}
        </div>
      );
    };

    const PineTree = ({ left, scale = 1, flip = false }) => {
      const [shaking, setShaking] = useState(false);
      const [leaves, setLeaves] = useState([]);
      const handleTap = (e) => {
        e.stopPropagation();
        window.playSuikinkutsu();
        setShaking(true);
        setTimeout(() => setShaking(false), 500);
        // Drop pine leaves
        const newLeaves = Array.from({ length: 6 }).map((_, i) => ({
          id: Date.now() + i,
          x: rnd(30, 70),
          y: rnd(55, 70),
          dur: rnd(2, 4).toFixed(1),
          delay: rnd(0, 0.5).toFixed(2),
          size: rnd(3, 6),
        }));
        setLeaves(newLeaves);
        setTimeout(() => setLeaves([]), 4500);
      };
      return (
        <div
          className="absolute bottom-[0vh] z-[2] origin-bottom drop-shadow-2xl pointer-events-none"
          style={{
            width: '200vw', height: '280vw', left: `${left}%`,
            transform: `scaleX(${flip ? -1 : 1}) scale(${scale})`,
            overflow: 'visible',
          }}
        >
          <div
            className="w-full h-full"
            style={{ animation: shaking ? 'treeShake 0.5s ease-out 1' : 'none' }}
          >
            <img
              src="./PineTree.png"
              className="w-full h-full object-contain"
              draggable="false"
            />
            {/* Clickable area - centered on trunk */}
            <div onClick={handleTap} className="absolute cursor-pointer" style={{ pointerEvents: 'auto', left: '30%', top: '20%', width: '40%', height: '70%' }} />

              style={{ animation: 'mountainScroll3 180s linear infinite' }}
            >
              <svg viewBox="0 0 1000 300" preserveAspectRatio="none" className="w-full h-[38vh] fill-[#5B717B]">
                <path d="M0,300 L0,230 Q20,210 30,220 Q50,150 70,200 Q100,220 120,180 Q150,150 180,210 Q250,160 300,230 Q350,210 370,180 Q400,160 430,220 L500,230 Q520,210 530,220 Q550,150 570,200 Q600,220 620,180 Q650,150 680,210 Q750,160 800,230 Q850,210 870,180 Q900,160 930,220 L1000,230 L1000,300 Z" />
              </svg>
            </div>

            <div className="mist-layer" />

            <GroundPlane />

            <motion.div 
              className="absolute inset-y-0 left-0 flex items-end will-change-transform z-[10]"
              style={{ x: xOffset }}
            >
              {chunks.map((chunk) => (
                <div key={chunk.id} className="h-full flex-shrink-0" style={{ position: 'relative', overflow: 'visible', width: `${CHUNK_WIDTH}px` }}>
                  <BiomeChunk biome={chunk.biome} windSpeed={windSpeed} />
                </div>
              ))}
            </motion.div>

            <ShibaDog />
            <SakuraParticles visibleBiomes={visibleBiomes} />

            {/* Global biome atmosphere overlays - always rendered, opacity transitions */}
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(50,35,20,0.45) 0%, rgba(60,40,25,0.35) 40%, rgba(70,50,30,0.2) 70%, rgba(80,55,30,0.1) 100%)', opacity: visibleBiomes.includes('shrine') ? 1 : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(15,22,15,0.4) 0%, rgba(10,18,10,0.3) 50%, rgba(10,18,10,0.15) 100%)', opacity: visibleBiomes.includes('bamboo') ? 1 : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(210,185,140,0.25) 0%, rgba(220,195,150,0.15) 50%, transparent 100%)', opacity: visibleBiomes.includes('zen') ? 1 : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(220,160,170,0.3) 0%, rgba(230,175,180,0.2) 40%, rgba(240,190,195,0.1) 70%, transparent 100%)', opacity: visibleBiomes.includes('sakura') ? 1 : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(100,80,140,0.35) 0%, rgba(110,85,150,0.25) 40%, rgba(120,95,155,0.15) 70%, transparent 100%)', opacity: visibleBiomes.includes('snow') ? 1 : 0, transition: 'opacity 3.5s ease-in-out' }} />

          </div>

          <div className="paper-texture" />
          
        </main>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<AndoHomepage />);
  </script>
</body>
</html>
